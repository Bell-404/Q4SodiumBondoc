<!DOCTYPE html>
<html>
    <head>
        <title>Graded Excercise 1</title>
        <link rel="stylesheet" href="styles.css">
        <!-- Font Awesome Icon Library for stars -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    </head>

    <body>
        <h1>1st Graded Excercise</h1>
        <button><a href="index.html">Back to home</a></button>

        <br><br>

        <div>
            <form>
                <h2>Add a Movie</h2>

                <!--Input movie title & year-->
                <label for="title">Title:</label><br>
                <input type="text" id="title" name="title"><br>

                <label for="year">Year:</label><br>
                <input type="text" id="year" name="year"><br>

                <!--Select genre-->
                <div class="genreselect">
                    <label for="genre">Genre</label></br>
                    <select name="genre" id="genre">
                        <option value="Action">Action</option>
                        <option value="Comedy">Comedy</option>              
                        <option value="Drama">Drama</option>             
                        <option value="Romance">Romance</option>
                        <option value="Sci-Fi">Sci-Fi</option>
                        <option value="Fantasy">Fantasy</option>
                        <option value="Horror">Horror</option>
                        <option value="Thriller">Thriller</option>
                    </select><br>
                </div>

                <!--add a star rating-->
                <label for="rating">Rating:</label><br>
                
                <div class="star-rating">
                    <span class="fa fa-star" data-rating="1"></span>
                    <span class="fa fa-star" data-rating="2"></span>
                    <span class="fa fa-star" data-rating="3"></span>
                    <span class="fa fa-star" data-rating="4"></span>
                    <span class="fa fa-star" data-rating="5"></span>
                </div>

                <!--Form submit button-->
                <input type="submit" value="Add Movie">

                <br>

                <!--Movie input list-->
                <div class="movielist">
                    <h2>Movie List</h2>
                    <ul id="movie-list">
                        <!-- Movie items will be added here -->
                    </ul>
                </div>
            </form>
        </div>
    </body>

    <script>
        // handle form submission and save data to local storage
        const form = document.querySelector('form');
        const movieList = document.getElementById('movie-list');
        const stars = document.querySelectorAll('.star-rating .fa');
        let selectedRating = 0;

        // handle star rating selection
        stars.forEach(star => {
            star.addEventListener('click', () => {
                selectedRating = parseInt(star.getAttribute('data-rating'));
                stars.forEach(s => {
                    s.classList.toggle('checked', parseInt(s.getAttribute('data-rating')) <= selectedRating);
                });
            });
        });

        // render page with saved data from local storage
        let movies = JSON.parse(localStorage.getItem('movies')) || [];
        function loadMovies() {
            let movies = JSON.parse(localStorage.getItem('movies')) || [];
            movies.forEach(movie => {
                const listItem = document.createElement('li');
                // wrap title in <strong> so it's bold
                listItem.innerHTML = `<strong>${movie.title}</strong> (${movie.year}) - ${movie.genre} - ${'★'.repeat(movie.rating)}${'☆'.repeat(5 - movie.rating)}`;
                movieList.appendChild(listItem);
            });
        }

        // load movies on page load
        loadMovies();

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const year = document.getElementById('year').value;
            const genre = document.getElementById('genre').value;

            if (title && year && genre && selectedRating) {
                const movie = { title, year, genre, rating: selectedRating };
                movies.push(movie);
                localStorage.setItem('movies', JSON.stringify(movies));
                const listItem = document.createElement('li');
                listItem.innerHTML = `<strong>${movie.title}</strong> (${movie.year}) - ${movie.genre} - ${'★'.repeat(movie.rating)}${'☆'.repeat(5 - movie.rating)}`;
                movieList.appendChild(listItem);
                form.reset();
                stars.forEach(s => s.classList.remove('checked'));
                selectedRating = 0;
            } else {
                alert('Please fill in all fields and select a rating.');
            }
        });




    </script>
</html>
