<!DOCTYPE html>
<html>
    <head>
        <title>CSS Positioning</title>
        <style>
            #container {
                display: flex;
                justify-content: center;
            }
            #container div {
                font-size: 25px;
                padding: 20px;
                background-color: plum;
                margin: 10px;
            }
            #static {
                position: static;
            }
            #relative {
                position: relative; 
                top: 20px;
            }
            #absolute {
                position: absolute;
                top: 100px;
                left: 50px;
            }
            p {
                margin-top: 1500px;
            }
        </style>
    </head>
          
        <body>
            <h1>CSS Positioning</h1>
            <div id="container">
                <div id="static">Static Positioning</div>
                <div id="relative">Relative Positioning</div>
                <div id="absolute">Absolute Positioning</div>
                <div id="fixed">Fixed Positioning</div>
                <div id="sticky">Sticky Positioning</div>
            </div>
            <br>
            <p>Scroll.</p> 
        </body>
</html>
