<!DOCTYPE html>
<html>
    <head>
        <title>Graded Excercise 1</title>
        <link rel="stylesheet" href="styles.css">
        <!-- Font Awesome Icon Library for stars -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    </head>

    <body>
        <h1>1st Graded Excercise</h1>
        <button><a href="index.html">Back to home</a></button>

        <br><br>

        <div>
            <form onsubmit="return validateForm()">
                <h2>Add a Movie</h2>

                <!--Input movie title & year-->
                <label for="title">Title:</label><br>
                <input type="text" id="title" name="title"><br>

                <label for="year">Year:</label><br>
                <input type="text" id="year" name="year"><br>

                <!--Select genre-->
                <div class="genreselect">
                    <label for="genre">Genre</label></br>
                    <select name="genre" id="genre">
                        <option value="Action">Action</option>
                        <option value="Comedy">Comedy</option>              
                        <option value="Drama">Drama</option>             
                        <option value="Romance">Romance</option>
                        <option value="Sci-Fi">Sci-Fi</option>
                        <option value="Fantasy">Fantasy</option>
                        <option value="Horror">Horror</option>
                        <option value="Thriller">Thriller</option>
                    </select><br>
                </div>

                <!--add a star rating-->
                <label for="rating">Rating:</label><br>
                
                <div class="star-rating">
                    <span class="fa fa-star" data-rating="1"></span>
                    <span class="fa fa-star" data-rating="2"></span>
                    <span class="fa fa-star" data-rating="3"></span>
                    <span class="fa fa-star" data-rating="4"></span>
                    <span class="fa fa-star" data-rating="5"></span>
                </div>

                <!--Form submit button-->
                <input type="submit" value="Add Movie">

                <br>

                <!--Movie input list-->
                <div class="movielist">
                    <h2>Movie List</h2>
                    <ul id="movie-list">
                        <!-- Movie items will be added here -->
                    </ul>
                </div>
            </form>
        </div>
    </body>

    <script>
        //validate form input
        function validateForm() {
            const title = document.querySelector('#title').value;
            const year = document.querySelector('#year').value;
            if (title === '' || year === '') {
                alert('Please fill in all fields');
                return false;
            }
            clearForm();
            return true;
        }

        // clear form after submission
        function clearForm() {
            document.querySelector('#title').value = '';
            document.querySelector('#year').value = '';
            document.querySelector('#genre').value = 'Action';
            document.querySelectorAll('.star-rating .fa-star').forEach(s => s.classList.remove('checked'));
        }
        
        // load saved data or start fresh
        let movies = JSON.parse(localStorage.getItem('movies')) || [];
        const movieList = document.getElementById('movie-list');
        
        // function to display movies on the page
        function displayMovies() {
            movieList.innerHTML = '';
            movies.forEach((movie, index) => {
                const li = document.createElement('li');
                li.textContent = `${movie.title} (${movie.year}) - ${movie.genre} - Rating: ${findAverageRating(movie)} stars`;
                movieList.appendChild(li);
                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = 'Delete';
                deleteBtn.addEventListener('click', function() {deleteMovie(index)});
                li.appendChild(deleteBtn);
            });
        }

        // handle form submission
        document.querySelector('form').addEventListener('submit', function(event) {
            event.preventDefault();
            const title = document.querySelector('#title').value;
            const year = document.querySelector('#year').value;
            const genre = document.querySelector('#genre').value;
            const rating = document.querySelector('.star-rating .fa-star.checked') ? document.querySelector('.star-rating .fa-star.checked').getAttribute('data-rating') : 0;
            const newMovie = { title, year, genre, rating };
            movies.push(newMovie);
            localStorage.setItem('movies', JSON.stringify(movies));
            displayMovies();

        })

        // star rating selection
        document.querySelectorAll('.star-rating .fa-star').forEach(star => {
            star.addEventListener('click', function() {
                document.querySelectorAll('.star-rating .fa-star').forEach(s => s.classList.remove('checked'));
                this.classList.add('checked');
            });
        });
        // find the average rating of each movie
        function findAverageRating(movie) {
            const ratings = movies.filter(m => m.title === movie.title).map(m => parseInt(m.rating));
            const average = ratings.reduce((a, b) => a + b, 0) / ratings.length;
            return average.toFixed(1);
        }

        // display movies on page load
        displayMovies();

        // delete a movie from the list
        function deleteMovie(index) {
            confirm('Are you sure you want to delete this movie?');
            movies.splice(index, 1);
            localStorage.setItem('movies', JSON.stringify(movies));
            displayMovies();
        }


    </script>
</html>
