<!DOCTYPE html>
<html>
<head>
  <meta name="author" content="Bondoc, Samantha Isabelle" />
  <meta name="revised" content="April 5, 2026" />
  <style>
    body { font-family: Arial, sans-serif; }
    .header, .footer {
      background: lightblue;
      padding: 10px;
    }
    .footer {
       opacity: 0.5;
       position: fixed;
       bottom: 0;
       width: 100%;
    }
    .sidebar {
      background: lightgreen;
      width: 150px;
      height: 200px;
      position: relative;
      top: 20px;
      right: 20px;
    }
    .content {
      background: lightyellow;
      width: 300px;
      height: 200px;
      position: absolute;
      top: 66px;
      left: 200px;
      z-index: 1;
    }    
    .notice {
      position: absolute;
      bottom: 450px;
      left: 400px;
      background: orange;
      padding: 10px;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="header">Header</div>
  <div class="sidebar">Sidebar</div>
  <div class="footer">Footer</div>
  <div class="group">
    <div class="content">Main Content</div>
    <div class="notice">Notice!</div>
  </div>
</body>
</html>
