<!DOCTYPE html>
<html>
    <head>
        <title>Graded Excercise 1</title>
        <link rel="stylesheet" href="styles.css">
        <!-- Font Awesome Icon Library for stars -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </head>

    <body>
        <h1>1st Graded Excercise</h1>
        <button><a href="index.html">Back to home</a></button>

        <br><br>

        <div>
            <form id="movieForm">
                <h2>Add a Movie</h2>

                <!--Input movie title & year-->
                <label for="title">Title:</label><br>
                <input type="text" id="title" name="title"><br>

                <label for="year">Year:</label><br>
                <input type="text" id="year" name="year"><br>

                <!--Select genre-->
                <div class="genreselect">
                    <label for="genre">Genre</label></br>
                    <select name="genre" id="genre">
                        <option value="Action">Action</option>
                        <option value="Comedy">Comedy</option>              
                        <option value="Drama">Drama</option>             
                        <option value="Romance">Romance</option>
                        <option value="Sci-Fi">Sci-Fi</option>
                        <option value="Fantasy">Fantasy</option>
                        <option value="Horror">Horror</option>
                        <option value="Thriller">Thriller</option>
                    </select><br>
                </div>

                <!--add a star rating-->
                <label for="rating">Rating:</label><br>
                
                <div class="star-rating">
                    <span class="fas fa-star" data-rating="1"></span>
                    <span class="fas fa-star" data-rating="2"></span>
                    <span class="fas fa-star" data-rating="3"></span>
                    <span class="fas fa-star" data-rating="4"></span>
                    <span class="fas fa-star" data-rating="5"></span>
                </div>

                <!--Form submit button-->
                <input type="submit" value="Add Movie">

                <br>

                <!--Movie input list-->
                <div class="movielist">
                    <ul id="movie-list">
                        <!-- Movie items will be added here -->
                    </ul>
                </div>
            </form>
        </div>


    </body>

    <script>
        //helpers for localStorage
        const KEY = 'movies';
        function loadMovies() {
            const raw = localStorage.getItem(KEY);
            return raw ? JSON.parse(raw) : [];
        }
        function saveMovies(movies) {
            localStorage.setItem(KEY, JSON.stringify(movies));
        }

        //render list to page
        function renderMovies() {
            const movies = loadMovies(); //get movies from localStorage
            const list = document.getElementById('movie-list');
            if (movies.length === 0) {
                list.innerHTML = '<li>No movies added yet.</li>';
                document.getElementById('average-rating').innerHTML = '';
                return;
            }
            list.innerHTML = movies.map((m,i) => //use index for delete reference
                `<li>
                    ${m.title} (${m.year}) - ${m.genre} - Rating: ${generateStars(m.rating)}
                    <button onclick="deleteMovie(${i})">Delete</button>
                </li>`
            ).join(''); //render list items with delete buttons
            
            //display average rating
            const averageRating = calculateAverageRating(movies);
            document.getElementById('average-rating').innerHTML = `Average Rating: ${generateStars(Math.round(averageRating))} (${averageRating.toFixed(1)} stars)`;
        }

        //function to calculate average rating
        function calculateAverageRating(movies) {
            if (movies.length === 0) return 0;
            const totalRating = movies.reduce((sum, movie) => sum + parseFloat(movie.rating || 0), 0);
            return totalRating / movies.length;
        }

        //function to generate star icons
        function generateStars(rating) {
            let stars = '';
            const numRating = parseFloat(rating) || 0;
            
            for (let i = 1; i <= 5; i++) {
                if (i <= numRating) {
                    //full star
                    stars += `<span class="fas fa-star checked"></span>`;
                } else if (i - 0.5 <= numRating) {
                    //half star - using CSS clip-path for better control
                    stars += `<span class="fas fa-star checked half-star"></span>`;
                } else {
                    //empty star
                    stars += `<span class="far fa-star"></span>`;
                }
            }
            return `<div class="star-rating">${stars}</div>`;
        }

        //form handling
        const form = document.getElementById('movieForm');
        form.onsubmit = e => {
            e.preventDefault(); //prevent page refresh on form submit
            const title = document.getElementById('title').value.trim();
            const year = document.getElementById('year').value.trim();
            const genre = document.getElementById('genre').value;
            const rating = Array.from(document.querySelectorAll('.star-rating .fas.fa-star.checked'))
                .map(star => parseInt(star.dataset.rating))
                .sort((a, b) => b - a)[0] || 0;
            if (!title || !year) return; //basic validation

            const movies = loadMovies(); //get existing movies from localStorage
            
            //check if movie already exists (same title and year)
            const existingMovieIndex = movies.findIndex(movie => 
                movie.title.toLowerCase() === title.toLowerCase() && movie.year === year
            );
            
            if (existingMovieIndex !== -1) {
                //movie exists, calculate average rating
                const existingMovie = movies[existingMovieIndex];
                const currentRating = parseFloat(existingMovie.rating) || 0;
                const newRating = parseFloat(rating) || 0;
                const averageRating = (currentRating + newRating) / 2;
                
                //update existing movie with average rating
                existingMovie.rating = averageRating.toFixed(1); //keep one decimal place
                existingMovie.genre = genre; //also update genre in case it changed
            } else {
                //movie doesn't exist, add as new
                const object = { title, year, genre, rating };
                movies.push(object);
            }
            
            saveMovies(movies); //save updated movies to localStorage
            form.reset(); //clear form fields
            clearStarRating(); //clear star selection
            renderMovies(); //re-render list to show updated movie
        };

        //computing star ratings
        document.querySelectorAll('.star-rating .fas.fa-star').forEach(star => {
            star.onclick = () => {
                const rating = star.dataset.rating;
                document.querySelectorAll('.star-rating .fas.fa-star').forEach(s => {
                    s.classList.toggle('checked', s.dataset.rating <= rating);
                });
            };
        });

        //function to clear star rating selection
        function clearStarRating() {
            document.querySelectorAll('.star-rating .fas.fa-star').forEach(star => {
                star.classList.remove('checked');
            });
        }

        //remove an item from localStorage
        function deleteMovie(i) {
            var confirmDelete = confirm("Are you sure you want to delete this movie?");
            if (!confirmDelete) return; //if user cancels, do nothing
            else {
                const movies = loadMovies();
                movies.splice(i, 1);
                saveMovies(movies);
                renderMovies();
            }
        }

        //initial render on page load
        renderMovies();
        clearStarRating(); //ensure no stars are pre-selected on page load

    </script>
</html>
